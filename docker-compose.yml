services:
  db:
    image: postgres:16-alpine
    container_name: rubymoney-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: rubymoney
      POSTGRES_PASSWORD: rubymoney
      POSTGRES_DB: rubymoney_development
    volumes:
      - rubymoney-pgdata:/var/lib/postgresql/data
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rubymoney"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: rubymoney-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3030:3030"
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgres://rubymoney:rubymoney@db:5432/rubymoney_development
      RAILS_MASTER_KEY: 7aa1034a6dedf564a32b521a6006fb18
      RAILS_SERVE_STATIC_FILES: "true"
      RAILS_LOG_TO_STDOUT: "true"
      PORT: "3030"
    command: ["./bin/rails", "server", "-b", "0.0.0.0", "-p", "3030"]

volumes:
  rubymoney-pgdata:
